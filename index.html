<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="dashboard">
        <section class="todo-group">
            <h2 class="group-header">ToDo Card</h2>
            <article class="todo-card" data-testid="test-todo-card">
                <div class="card-header">
                    <button type="button" 
                            role="checkbox" 
                            aria-checked="false" 
                            aria-label="Mark task as complete"
                            class="custom-checkbox"
                            data-testid="test-todo-complete-toggle"
                            onclick="toggleCheckbox(this)">
                    </button>
                    <h3 class="todo-title" data-testid="test-todo-title">Take Insulin Injection</h3>
                </div>

                <p class="todo-description" data-testid="test-todo-description">Take insulin injection.</p>

                <div class="todo-meta">
                    <span class="badge high" data-testid="test-todo-priority">High</span>
                    <span data-testid="test-todo-status">Pending</span>
                    <time datetime="2026-04-20" data-testid="test-todo-due-date">Due Apr 20, 2026</time>
                    <span class="time-hint" data-testid="test-todo-time-remaining">Due in 9 days</span>
                </div>

                <ul class="tag-list" role="list" data-testid="test-todo-tags">
                    <li class="tag" data-testid="test-todo-tag-work">Work</li>
                    <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
                </ul>

                <div class="card-actions">
                    <button data-testid="test-todo-edit-button" onclick="editTodo(this)">Edit</button>
                    <button data-testid="test-todo-delete-button" onclick="deleteTodo(this)">Delete</button>
                </div>
            </article>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
